<ngx-charts-chart [view]="[width, height]" [showLegend]="configValues.legend" [legendOptions]="legendOptions"
    [activeEntries]="activeEntries" [animations]="animations" (legendLabelClick)="onClick($event)"
    (legendLabelActivate)="onActivate($event)" (legendLabelDeactivate)="onDeactivate($event)">
    <svg:defs>
        <svg:clipPath [attr.id]="clipPathId">
            <svg:rect [attr.width]="dims.width + 10" [attr.height]="dims.height + 10"
                [attr.transform]="'translate(-5, -5)'" />
        </svg:clipPath>
    </svg:defs>
    <svg:g [attr.transform]="transform" class="area-chart chart">
        <svg:g ngx-charts-x-axis *ngIf="configValues.xAxis" [xScale]="xScale" [dims]="dims" [showGridLines]="configValues.showGridLines"
            [showLabel]="configValues.showXAxisLabel" [labelText]="configValues.xAxisLabel" [trimTicks]="configValues.trimXAxisTicks"
            [rotateTicks]="configValues.rotateXAxisTicks" [maxTickLength]="configValues.maxXAxisTickLength" [tickFormatting]="configValues.xAxisTickFormatting"
            [ticks]="configValues.xAxisTicks" [wrapTicks]="configValues.wrapTicks" (dimensionsChanged)="updateXAxisHeight($event)"></svg:g>
        <svg:g ngx-charts-y-axis *ngIf="configValues.yAxis" [yScale]="yScale" [dims]="dims" [showGridLines]="configValues.showGridLines"
            [showLabel]="configValues.showYAxisLabel" [labelText]="configValues.yAxisLabel" [trimTicks]="configValues.trimYAxisTicks"
            [maxTickLength]="configValues.maxYAxisTickLength" [tickFormatting]="configValues.yAxisTickFormatting" [ticks]="configValues.yAxisTicks"
            [wrapTicks]="configValues.wrapTicks" (dimensionsChanged)="updateYAxisWidth($event)"></svg:g>
        <svg:g [attr.clip-path]="clipPath">
            <svg:g *ngFor="let series of results; trackBy: trackBy">
                <svg:g ngx-charts-area-series [xScale]="xScale" [yScale]="yScale" [colors]="colors" [data]="series"
                    [scaleType]="scaleType" [activeEntries]="activeEntries" [gradient]="configValues.gradient" [normalized]="false"
                    [curve]="configValues.curve" [animations]="animations" />
            </svg:g>

            <svg:g *ngIf="!configValues.tooltipDisabled" (mouseleave)="hideCircles()">
                <svg:g ngx-charts-tooltip-area [dims]="dims" [xSet]="xSet" [xScale]="xScale" [yScale]="yScale"
                    [results]="results" [colors]="colors" [tooltipDisabled]="configValues.tooltipDisabled"
                    [tooltipTemplate]="seriesTooltipTemplate" (hover)="updateHoveredVertical($event)" />

                <svg:g *ngFor="let series of results">
                    <svg:g ngx-charts-circle-series [type]="seriesType.Stacked" [xScale]="xScale" [yScale]="yScale"
                        [colors]="colors" [activeEntries]="activeEntries" [data]="series" [scaleType]="scaleType"
                        [visibleValue]="hoveredVertical" [tooltipDisabled]="configValues.tooltipDisabled"
                        [tooltipTemplate]="tooltipTemplate" (select)="onClick($event, series)"
                        (activate)="onActivate($event)" (deactivate)="onDeactivate($event)" />
                </svg:g>
            </svg:g>
        </svg:g>
    </svg:g>
    <svg:g ngx-charts-timeline *ngIf="configValues.timeline && scaleType != 'ordinal'" [attr.transform]="timelineTransform"
        [results]="results" [view]="[timelineWidth, height]" [height]="timelineHeight" [scheme]="scheme"
        [customColors]="customColors" [legend]="configValues.legend" [scaleType]="scaleType" (onDomainChange)="updateDomain($event)">
        <svg:g *ngFor="let series of results; trackBy: trackBy">
            <svg:g ngx-charts-area-series [xScale]="timelineXScale" [yScale]="timelineYScale" [colors]="colors"
                [data]="series" [scaleType]="scaleType" [gradient]="configValues.gradient" [normalized]="false" [curve]="configValues.curve"
                [animations]="animations" />
        </svg:g>
    </svg:g>
</ngx-charts-chart>
