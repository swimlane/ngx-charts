<ngx-charts-chart [view]="[width, height]" [showLegend]="configValues.legend" [legendOptions]="legendOptions"
  [activeEntries]="activeEntries" [animations]="animations" (legendLabelActivate)="onActivate($event, undefined, true)"
  (legendLabelDeactivate)="onDeactivate($event, undefined, true)" (legendLabelClick)="onClick($event)">
  <svg:g [attr.transform]="transform" class="bar-chart chart">
    <svg:g ngx-charts-x-axis *ngIf="configValues.xAxis" [xScale]="xScale" [dims]="dims" [showLabel]="configValues.showXAxisLabel"
      [labelText]="configValues.xAxisLabel" [trimTicks]="configValues.trimXAxisTicks" [rotateTicks]="configValues.rotateXAxisTicks"
      [maxTickLength]="configValues.maxXAxisTickLength" [tickFormatting]="configValues.xAxisTickFormatting" [ticks]="configValues.xAxisTicks"
      [wrapTicks]="configValues.wrapTicks" (dimensionsChanged)="updateXAxisHeight($event)"></svg:g>
    <svg:g ngx-charts-y-axis *ngIf="configValues.yAxis" [yScale]="yScale" [dims]="dims" [showGridLines]="configValues.showGridLines"
      [showLabel]="configValues.showYAxisLabel" [labelText]="configValues.yAxisLabel" [trimTicks]="configValues.trimYAxisTicks"
      [maxTickLength]="configValues.maxYAxisTickLength" [tickFormatting]="configValues.yAxisTickFormatting" [ticks]="configValues.yAxisTicks"
      [wrapTicks]="configValues.wrapTicks" (dimensionsChanged)="updateYAxisWidth($event)"></svg:g>
    <svg:g *ngIf="!isSSR">
      <svg:g *ngFor="let group of results; trackBy: trackBy" [@animationState]="'active'" [attr.transform]="groupTransform(group)">
        <svg:g ngx-charts-series-vertical [type]="barChartType.Normalized" [xScale]="xScale" [yScale]="yScale"
          [activeEntries]="activeEntries" [colors]="colors" [series]="group.series" [dims]="dims" [gradient]="configValues.gradient"
          [tooltipDisabled]="configValues.tooltipDisabled" [tooltipTemplate]="tooltipTemplate" [seriesName]="group.name"
          [animations]="animations" [noBarWhenZero]="configValues.noBarWhenZero" (select)="onClick($event, group)"
          (activate)="onActivate($event, group)" (deactivate)="onDeactivate($event, group)"></svg:g>
      </svg:g>
    </svg:g>
    <svg:g *ngIf="isSSR">
      <svg:g *ngFor="let group of results; trackBy: trackBy" [attr.transform]="groupTransform(group)">
        <svg:g ngx-charts-series-vertical [type]="barChartType.Normalized" [xScale]="xScale" [yScale]="yScale"
          [activeEntries]="activeEntries" [colors]="colors" [series]="group.series" [dims]="dims" [gradient]="configValues.gradient"
          [tooltipDisabled]="configValues.tooltipDisabled" [tooltipTemplate]="tooltipTemplate" [seriesName]="group.name"
          [animations]="animations" [noBarWhenZero]="configValues.noBarWhenZero" (select)="onClick($event, group)"
          (activate)="onActivate($event, group)" (deactivate)="onDeactivate($event, group)"></svg:g>
      </svg:g>
    </svg:g>
  </svg:g>
</ngx-charts-chart>
