<ngx-charts-chart [view]="[width, height]" [showLegend]="configValues.legend" [legendOptions]="legendOptions"
  [activeEntries]="activeEntries" [animations]="animations" (legendLabelClick)="onClick($event)"
  (legendLabelActivate)="onActivate($event, undefined, true)" (legendLabelDeactivate)="onDeactivate($event, undefined, true)">
  <svg:g [attr.transform]="transform" class="bar-chart chart">
    <svg:g ngx-charts-x-axis *ngIf="configValues.xAxis" [xScale]="groupScale" [dims]="dims" [showLabel]="configValues.showXAxisLabel"
      [labelText]="configValues.xAxisLabel" [trimTicks]="configValues.trimXAxisTicks" [rotateTicks]="configValues.rotateXAxisTicks"
      [maxTickLength]="configValues.maxXAxisTickLength" [tickFormatting]="configValues.xAxisTickFormatting" [ticks]="configValues.xAxisTicks"
      [wrapTicks]="configValues.wrapTicks" (dimensionsChanged)="updateXAxisHeight($event)"></svg:g>
    <svg:g ngx-charts-y-axis *ngIf="configValues.yAxis" [yScale]="valueScale" [dims]="dims" [showGridLines]="configValues.showGridLines"
      [showLabel]="configValues.showYAxisLabel" [labelText]="configValues.yAxisLabel" [trimTicks]="configValues.trimYAxisTicks"
      [maxTickLength]="configValues.maxYAxisTickLength" [tickFormatting]="configValues.yAxisTickFormatting" [ticks]="configValues.yAxisTicks"
      [wrapTicks]="configValues.wrapTicks" (dimensionsChanged)="updateYAxisWidth($event)"></svg:g>
    <svg:g *ngFor="let group of results; let index = index; trackBy: trackBy" [attr.transform]="groupTransform(group)">
      <svg:g ngx-charts-series-vertical [xScale]="innerScale" [yScale]="valueScale" [colors]="colors" [series]="group.series"
        [activeEntries]="activeEntries" [roundEdges]="configValues.roundEdges" [gradient]="configValues.gradient" [tooltipDisabled]="configValues.tooltipDisabled"
        [tooltipTemplate]="tooltipTemplate" [animations]="animations" [showDataLabel]="configValues.showDataLabel"
        [dataLabelFormatting]="configValues.dataLabelFormatting" [noBarWhenZero]="configValues.noBarWhenZero"
        (select)="onClick($event, group)" (activate)="onActivate($event, group)" (deactivate)="onDeactivate($event, group)"
        (dataLabelHeightChanged)="onDataLabelMaxHeightChanged($event, index)" />
    </svg:g>
  </svg:g>
</ngx-charts-chart>
